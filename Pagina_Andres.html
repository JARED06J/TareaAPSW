<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página de Andrés</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: white;
            text-align: center;
        }

        .contenedor {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: white;
            color: #4e73df;
            transition: 0.3s;
        }

        button:hover {
            background-color: #f8f9fc;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Bienvenido a la página de Andrés</h1>
        <p>Este es un sitio web sencillo creado con HTML y CSS.</p>

        <button onclick="mostrarMensaje()">Haz clic aquí</button>
    </div>

    <script>
        function mostrarMensaje() {
            alert("Gracias por visitar mi página!");
        }
    </script>

</body>
</html>
