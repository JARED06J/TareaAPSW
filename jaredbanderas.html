<!DOCTYPE html>
<html>
<head>
	<title>solución ejercicio de banderas</title>

<style>
    div{width:300px;height:200px;margin:20px;
	display:inline-block;
	border:1px solid #000;
}

.costarica {
  width: 300px;
  height: 200px;
  background: linear-gradient(
    to bottom,
    blue 0%, blue 20%,
    white 20%, white 40%,
    red 40%, red 60%,
    white 60%, white 80%,
    blue 80%, blue 100%
  );
}

.Peru{
	background-image:linear-gradient(90deg,red 33%, white 33%, white 66.66%, red 66.66%);
}

.Rumania{
	background-image:linear-gradient(90deg, blue 33%, yellow 33%, yellow 66.66%, red 66.66%);
}

.espana{
	background-image:linear-gradient(red 33%, yellow 33%, yellow 66.66%, red 66.66%);
	color:#fff;
}

.Nicaragua{
  	background-image:linear-gradient(blue 33%, white 33%, white 66.66%, blue 66.66%);
}

.Indonesia{
	background-image:linear-gradient(red 50%, white 50%);
}
</style>

</head>
<body>

	<div class="costarica">Costa Rica</div>
	<div class="Peru">Peru</div>
	<div class="Rumania">Rumania</div>
	<div class="espana">Espana</div>
	<div class="Nicaragua">Nicaragua</div>
	<div class="Indonesia">Indonesia</div>

</body>
</html>
